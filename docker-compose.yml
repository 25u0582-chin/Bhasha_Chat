services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_NAME: Multilingual Real-Time Chat Platform
      ENVIRONMENT: development
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/chatbot
      MONGO_URL: mongodb://mongo:27017
      TRANSLATION_BACKEND: mock
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - mongo

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
